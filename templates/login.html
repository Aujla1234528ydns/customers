{% extends "base.html" %}

{% block title %}
Admin Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow-lg">

<div class="card-body p-5">

<div class="text-center mb-4">

<i class="bi bi-person-circle"
style="font-size:70px;color:#2563eb;"></i>

<h2 class="mt-3">

Admin Login

</h2>

<p class="text-muted">

Sign in to continue

</p>

</div>

<form action="/login" method="POST">

<div class="mb-3">

<label>

Username

</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-4">

<label>

Password

</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="d-grid">

<button class="btn btn-primary btn-lg">

<i class="bi bi-box-arrow-in-right"></i>

Login

</button>

</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
